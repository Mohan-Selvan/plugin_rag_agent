<!DOCTYPE html>
<html>
<head>
  <title>Chat Widget</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      background: #f9f9f9;
    }
    .message {
      margin-bottom: 10px;
    }
    .bot {
      color: #333;
    }
    .user {
      color: #007bff;
    }
    .error {
      color: red;
    }
    #msg {
      width: 100%;
      padding: 10px;
      box-sizing: border-box;
      border-top: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <div id="chat"></div>
  <input id="msg" placeholder="Type your message...">
  <script>
    const chat = document.getElementById('chat');
    const msg = document.getElementById('msg');
    const session_id = "session-" + Math.random().toString(36).substring(2);

    function displayMessage(content, sender = "user") {
      const div = document.createElement('div');
      div.className = `message ${sender}`;
      div.textContent = `${sender === 'user' ? "You" : sender === "bot" ? "Bot" : "Error"}: ${content}`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    msg.addEventListener("keypress", async function (e) {
      if (e.key === "Enter" && msg.value.trim() !== "") {
        const userMsg = msg.value.trim();
        displayMessage(userMsg, "user");
        msg.value = "";

        try {
          const res = await fetch("http://localhost:8000/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: userMsg, session_id })
          });

          const data = await res.json();

          console.log(data)

          if (!res.ok) {
            displayMessage(data.detail || "An error occurred. Please try again later.", "error");
          } else if (data.response) {
            displayMessage(data.response, "bot");
          } else {
            displayMessage("Received an empty response.", "error");
          }
        } catch (err) {
          displayMessage("Network error. Please check your connection.", "error");
        }
      }
    });
  </script>
</body>
</html>
