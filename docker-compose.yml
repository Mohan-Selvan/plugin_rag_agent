services:
  qdrant:
    image: qdrant/qdrant
    container_name: plugin-rag-qdrant
    restart: on-failure:5
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
    container_name: plugin-rag-api
    restart: on-failure:5
    depends_on:
      qdrant:
        condition: service_healthy
    env_file:
      - ./config/.env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - PLUGIN_RAG_CONFIG=/app/config/config.yaml
      # Set RESET=1 to wipe chat history + drop+rebuild qdrant collection.
      # Set REINGEST=1 to drop+rebuild qdrant collection (keep chat history).
      - RESET=${RESET:-0}
      - REINGEST=${REINGEST:-0}
    # Lets the api container reach the operator's local LLM server
    # (Ollama, llama.cpp, vLLM, ...) running on the host machine.
    # OLLAMA_HOST in .env should be http://host.docker.internal:11434
    # for that case, or any reachable URL for a remote LLM server.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data:ro
      - ./storage:/app/storage
    ports:
      - "8000:8000"

volumes:
  qdrant_data:
