<!DOCTYPE html>
<html>
<head>
  <title>Chat Widget</title>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 10px; }
    #chat-box { height: 420px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
    #input { width: 100%; padding: 10px; font-size: 14px; box-sizing: border-box; }
    .msg-user { color: #000; margin-bottom: 5px; }
    .msg-bot { color: #007acc; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div id="chat-box"></div>
  <input id="input" placeholder="Type a message..." autocomplete="off" />
  <script>
    const chatBox = document.getElementById("chat-box");
    const input = document.getElementById("input");

    let session_id = sessionStorage.getItem("session_id");
    if (!session_id) {
      session_id = "sess-" + Math.random().toString(36).substring(2, 10);
      sessionStorage.setItem("session_id", session_id);
      console.log("Created a new session id : ", session_id)
    }

    input.addEventListener("keydown", async (e) => {
      if (e.key === "Enter" && input.value.trim()) {
        const msg = input.value.trim();
        input.value = "";
        chatBox.innerHTML += `<div class="msg-user"><b>You:</b> ${msg}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        console.log("Using session id : ", session_id)

        try {
          const res = await fetch("http://localhost:8000/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: msg, session_id: session_id })
          });
          const data = await res.json();
          chatBox.innerHTML += `<div class="msg-bot"><b>Bot:</b> ${data.response}</div>`;
          chatBox.scrollTop = chatBox.scrollHeight;
        } catch (err) {
          chatBox.innerHTML += `<div class="msg-bot">Error contacting server.</div>`;
        }
      }
    });
  </script>
</body>
</html>
