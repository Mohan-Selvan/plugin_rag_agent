<!DOCTYPE html>
<html>
<head>
  <title>Chatbot UI</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    #chat-box { height: 300px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; }
    .message { margin: 5px 0; }
    .user { font-weight: bold; color: blue; }
    .bot { color: green; }
  </style>
</head>
<body>
  <h2>Chat with our Assistant</h2>
  <div id="chat-box"></div>
  <input type="text" id="message-input" placeholder="Type your message..." />
  <button onclick="sendMessage()">Send</button>

  <script>
    const chatBox = document.getElementById("chat-box");
    const input = document.getElementById("message-input");
    const session_id = "demo-user";  // Could be random or per tab

    function appendMessage(sender, text) {
      const div = document.createElement("div");
      div.className = "message " + sender;
      div.textContent = `${sender === 'user' ? 'You' : 'Bot'}: ${text}`;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function typeBotResponse(text) {
        const div = document.createElement("div");
        div.className = "message bot";
        chatBox.appendChild(div);

        let index = 0;
        const interval = setInterval(() => {
            if (index < text.length) {
            div.textContent += text.charAt(index);
            chatBox.scrollTop = chatBox.scrollHeight;
            index++;
            } else {
            clearInterval(interval);
            }
        }, 30);
    }

    async function sendMessage() {
      const msg = input.value;
      if (!msg) return;

      appendMessage("user", msg);
      input.value = "";

      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg, session_id })
      });

      const data = await res.json();
      typeBotResponse(data.response);
    }
  </script>
</body>
</html>
